<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- Preload critical assets -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

    <title>OctaNova Web3 App</title>
    
    <!-- Native HTML Initial Render to fix white screen -->
    <style>
      body { background-color: #0A0A0A; margin: 0; }
      #app-bootstrap-loader {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background-color: #0A0A0A; z-index: 999999;
      }
      .bootstrap-spinner {
        width: 80px; height: 80px; border-radius: 50%;
        background: linear-gradient(45deg, #7C3AED, #EC4899);
        padding: 2px;
        animation: pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      .bootstrap-inner {
        width: 100%; height: 100%; background: #000; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        color: white; font-family: sans-serif; font-weight: bold; font-size: 28px;
      }
      @keyframes pulse-glow {
        0%, 100% { opacity: 1; box-shadow: 0 0 20px rgba(124,58,237,0.8); }
        50% { opacity: 0.5; box-shadow: 0 0 10px rgba(124,58,237,0.3); }
      }
      @media (prefers-reduced-motion: reduce) {
        .bootstrap-spinner { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-bootstrap-loader">
        <div class="bootstrap-spinner">
          <div class="bootstrap-inner">O</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
